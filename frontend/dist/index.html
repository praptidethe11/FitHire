<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitHire — Intelligent Candidate Ranking</title>
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --muted: #888888;
            --accent: #7828c8;
            --green: #17c964;
            --red: #f31260;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            overflow-x: hidden;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            background: rgba(3,3,3,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: white; }
        .logo span { color: var(--muted); }
        
        .hero {
            padding: 150px 20px 80px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .hero h1 { font-size: 72px; margin-bottom: 20px; letter-spacing: -0.03em; }
        .hero p { color: var(--muted); font-size: 18px; }

        .container-scroll {
            max-width: 1000px;
            margin: 0 auto 100px;
            padding: 20px;
            perspective: 1000px;
        }
        .card {
            background: #111;
            border: 4px solid #333;
            border-radius: 30px;
            padding: 40px;
            transform: rotateX(15deg);
            transition: transform 0.5s ease-out;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }
        .card.flat { transform: rotateX(0deg); }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .input-box { background: #050505; border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        .label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; }
        
        textarea {
            width: 100%; height: 150px; background: transparent; border: 1px solid var(--border);
            border-radius: 10px; color: white; padding: 15px; resize: none; outline: none;
        }
        
        .file-drop {
            border: 2px dashed var(--border); border-radius: 10px; padding: 30px;
            text-align: center; cursor: pointer; color: var(--muted); font-size: 14px;
        }
        .file-drop.active { border-color: var(--green); background: rgba(23, 201, 100, 0.05); }

        .btn {
            width: 100%; padding: 20px; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: white; color: black; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
        
        #results-section { display: none; max-width: 1000px; margin: 0 auto 100px; padding: 0 20px; }
        .result-item {
            background: #0a0a0a; border: 1px solid var(--border); padding: 25px;
            border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center;
        }
        .rank { width: 50px; font-size: 24px; font-weight: 800; color: var(--muted); }
        .info { flex: 1; }
        .name { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
        .reason { font-size: 14px; color: var(--muted); line-height: 1.4; }
        .score { width: 100px; text-align: right; font-size: 24px; font-weight: 700; color: var(--green); }

        .loading {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">Fit<span>Hire</span></a>
    <button id="load-demo-btn" class="btn-outline" style="width: auto; padding: 10px 20px; border-radius: 100px; font-size: 12px;">Load Demo</button>
</nav>

<div class="hero">
    <h1>Rank candidates.<br>Unleash the power.</h1>
    <p>The intelligent engine that scores every profile against your JD using semantic alignment.</p>
</div>

<div class="container-scroll">
    <div class="card" id="main-card">
        <div class="input-group">
            <div class="input-box">
                <div class="label">Job Description</div>
                <textarea id="jd-text" placeholder="Paste requirements here..."></textarea>
                <div style="margin-top: 15px;">
                    <input type="file" id="jd-file" accept=".pdf,.docx,.txt" style="display: none;">
                    <div class="file-drop" onclick="document.getElementById('jd-file').click()" id="jd-drop">
                        Upload JD (.pdf, .docx, .txt)
                    </div>
                </div>
            </div>
            <div class="input-box">
                <div class="label">Candidate Pool</div>
                <input type="file" id="cand-file" accept=".xlsx,.xls,.csv,.json,.jsonl" style="display: none;">
                <div class="file-drop" onclick="document.getElementById('cand-file').click()" id="cand-drop" style="height: 220px; display: flex; align-items: center; justify-content: center;">
                    Drop Excel/CSV/JSON Pool
                </div>
                <div id="cand-status" style="font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center;">Awaiting files...</div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 30px; align-items: center;">
            <div style="flex: 1; background: #050505; border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between;">
                <span class="label" style="margin: 0;">Shortlist Size</span>
                <input type="number" id="top-n" value="10" min="1" step="1" style="background: transparent; border: 1px solid #333; color: white; width: 60px; padding: 5px; border-radius: 5px;">
            </div>
        </div>

        <button id="rank-btn" class="btn btn-primary">Initialize Ranking Engine</button>
    </div>
</div>

<section id="results-section">
    <h2 style="font-size: 32px; margin-bottom: 30px;">Ranked Shortlist</h2>
    <div id="results-container"></div>
    <div style="display: flex; gap: 20px; margin-top: 40px;">
        <button id="export-btn" class="btn btn-primary" style="width: auto; padding: 15px 40px;">Download as CSV</button>
        <button onclick="window.location.reload()" class="btn btn-outline" style="width: auto; padding: 15px 40px;">Start New Session</button>
    </div>
</section>

<div class="loading" id="loading-overlay">
    <div class="spinner"></div>
    <div style="margin-top: 20px; letter-spacing: 2px; font-size: 12px; color: var(--muted);">ANALYZING PROFILES...</div>
</div>

<script>
    // Scroll Animation
    window.addEventListener('scroll', () => {
        const card = document.getElementById('main-card');
        const scrollPos = window.scrollY;
        if (scrollPos > 100) {
            card.classList.add('flat');
        } else {
            card.classList.remove('flat');
        }
    });

    // App Logic
    const state = {
        demoCandidates: null,
        lastResults: null
    };

    // File Handlers
    document.getElementById('jd-file').onchange = (e) => {
        const file = e.target.files[0];
        if (file) document.getElementById('jd-drop').textContent = file.name;
    };
    document.getElementById('cand-file').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('cand-drop').textContent = file.name;
            document.getElementById('cand-status').textContent = 'File ready';
        }
    };

    // Load Demo
    document.getElementById('load-demo-btn').onclick = async () => {
        try {
            const jd = await fetch('/data/sample_jd.txt').then(r => r.text());
            document.getElementById('jd-text').value = jd;
            const cand = await fetch('/data/sample_candidates.json').then(r => r.json());
            state.demoCandidates = JSON.stringify(cand);
            document.getElementById('cand-status').textContent = '10 candidates loaded';
            document.getElementById('cand-drop').textContent = 'sample_candidates.json';
            alert('Demo data loaded successfully!');
        } catch (e) {
            alert('Error loading demo data');
        }
    };

    // Rank Engine
    document.getElementById('rank-btn').onclick = async () => {
        const jdText = document.getElementById('jd-text').value;
        const jdFile = document.getElementById('jd-file').files[0];
        const candFile = document.getElementById('cand-file').files[0];
        const topN = document.getElementById('top-n').value;

        if (!jdText && !jdFile) return alert('Please provide a Job Description');
        if (!candFile && !state.demoCandidates) return alert('Please provide a Candidate Pool');

        const formData = new FormData();
        if (jdFile) formData.append('jd_file', jdFile);
        else formData.append('jd_text', jdText);

        if (candFile) formData.append('candidates_file', candFile);
        else formData.append('candidates_text', state.demoCandidates);

        formData.append('top_n', topN);
        formData.append('use_ai', 'true');

        document.getElementById('loading-overlay').style.display = 'flex';

        try {
            const resp = await fetch('/api/rank', { method: 'POST', body: formData });
            const data = await resp.json();
            
            if (data.success) {
                state.lastResults = data.results;
                const container = document.getElementById('results-container');
                container.innerHTML = data.results.map(r => `
                    <div class="result-item">
                        <div class="rank">${r.rank}</div>
                        <div class="info">
                            <div class="name">${r.name}</div>
                            <div class="reason">${r.reasoning}</div>
                        </div>
                        <div class="score">${(r.score * 100).toFixed(0)}%</div>
                    </div>
                `).join('');
                document.getElementById('results-section').style.display = 'block';
                window.scrollTo({ top: document.getElementById('results-section').offsetTop - 100, behavior: 'smooth' });
            } else {
                alert('Error: ' + (data.detail || 'Ranking failed'));
            }
        } catch (e) {
            alert('Server error');
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    };

    // Export CSV
    document.getElementById('export-btn').onclick = async () => {
        if (!state.lastResults) return;
        const resp = await fetch('/api/export/csv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ results: state.lastResults })
        });
        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'FitHire_Rankings.csv';
        a.click();
    };
</script>
</body>
</html>
